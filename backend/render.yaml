services:
  - type: web
    name: formpulse-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GROQ_API_KEY
        sync: false # User will input their key in Render Dashboard
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
